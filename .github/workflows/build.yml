name: "Build"

on:
  workflow_dispatch:
  schedule:
    - cron: '45 3 * * 5' # At 03:45 on Friday

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  website:
    name: Website
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          testing: false

      - name: 🐧 Install dependencies
        run: |
          sudo apt-get install   \
            libapp-options-perl  \
            libdbd-csv-perl      \
            libdbd-sqlite3-perl  \
            libencode-perl       \
            libjson-xs-perl      \
            libtemplate-perl     \
            libyaml-libyaml-perl \
            rclone               \
            sqlite3

      # https://github.com/marketplace/actions/checkout
      - name: 🛎️ Checkout
        uses: actions/checkout@v6

      # Configure Workload Identity Federation via a credentials file.
      - id: auth
        name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/187514662523/locations/global/workloadIdentityPools/github-com/providers/github-com-oidc'
          service_account: 'gh-compute-machine-types@gcloud-compute-344913.iam.gserviceaccount.com'
          export_environment_variables: true
      # Install gcloud, `setup-gcloud` automatically picks up authentication from `auth`.
      - name: '🔧 Set up Google Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      # Now you can run gcloud commands authenticated as the impersonated service account.

      - name: 🔨 Run build script
        run: |
          cd build || exit 9
          bash build.sh || exit 9

      - name: 📑 Create website
        run: |
          cd build || exit 9
          perl site.pl > /dev/null || exit 9

      - name: 🧪 Tests
        run: |
          cat "site/europe-west4/n2-standard-8.html" | grep '249' || exit 9
          jq -e '.[] | .name' "site/instance_in_region.json" | grep '"n2-standard-8"' || exit 9

      - name: 💾 Commit last build
        run: |
          cd build || exit 9
          bash commit.sh || exit 9

      - name: 🚀 Publish website
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p "$HOME/.ssh" || exit 9
          echo "$SSH_KEY" > "$HOME/.ssh/deploy.key" || exit 9
          chmod 600 "$HOME/.ssh/deploy.key" || exit 9
          ssh-keyscan -p "$SSH_PORT" "$SSH_SERVER" >> "$HOME/.ssh/known_hosts" || exit 9
          rclone copy "site/" ":sftp:/var/www/gcloud-compute.com" \
            --sftp-host "$SSH_SERVER" \
            --sftp-port "$SSH_PORT" \
            --sftp-user "$SSH_USER" \
            --sftp-key-file "$HOME/.ssh/deploy.key" \
            --sftp-known-hosts-file "$HOME/.ssh/known_hosts" \
            --transfers 4 \
            --checkers 4 \
            --sftp-concurrency 128 \
            --sftp-disable-hashcheck \
            --ignore-checksum \
            --sftp-set-modtime=false \
            --ignore-times \
            --use-mmap || exit 9
